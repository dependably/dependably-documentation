stages:
  - check
  - publish

default:
  interruptible: true

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

spell:
  stage: check
  image: python:3.12-alpine
  script:
    - pip install --quiet codespell
    - codespell docs/ README.md

markdownlint:
  stage: check
  image: node:20-alpine
  script:
    - npx -y markdownlint-cli2 "docs/**/*.md" "README.md"

links:
  stage: check
  image:
    name: lycheeverse/lychee:latest
    entrypoint: [""]
  script:
    # Internal-only — external HTTP(S) checks are flaky in CI.
    - lychee --no-progress --exclude '^https?://' docs/ README.md

secrets:
  stage: check
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-banner --redact -v

publish:github:
  stage: publish
  image: alpine/git:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - '[ -n "$GITHUB_TOKEN" ] || { echo "GITHUB_TOKEN not set in CI/CD variables"; exit 1; }'
    - echo "Mirroring $CI_COMMIT_SHA to github.com/dependably/dependably-documentation"
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/dependably/dependably-documentation.git"
    - git push github HEAD:refs/heads/main
